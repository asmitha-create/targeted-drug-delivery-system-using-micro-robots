  <!-- Diagnosis Form Section -->
  <section class="diagnosis">
    <h2>Patient Diagnosis Form</h2>
    <div class="card">
      <form id="diagnosisForm">
        <label for="name">Patient Name</label>
        <input type="text" id="name" required>

        <label for="age">Age</label>
        <input type="number" id="age" required>

        <label for="gender">Gender</label>
        <select id="gender">
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <label for="factor">Disease Causing Factor (Optional)</label>
        <input type="text" id="factor">

        <label for="bodypart">Affected Body Part</label>
        <select id="bodypart">
          <option>Head</option>
          <option>Chest</option>
          <option>Stomach</option>
          <option>Skin</option>
        </select>

        <label for="days">Number of Days Affected</label>
        <input type="number" id="days">

        <label>Symptoms</label>
        <div class="checkbox-group">
          <label><input type="checkbox" value="fever"> Fever</label>
          <label><input type="checkbox" value="headache"> Headache</label>
          <label><input type="checkbox" value="fatigue"> Fatigue</label>
          <label><input type="checkbox" value="rash"> Rash</label>
          <label><input type="checkbox" value="joint pain"> Joint Pain</label>
          <label><input type="checkbox" value="chills"> Chills</label>
          <label><input type="checkbox" value="sweating"> Sweating</label>
          <label><input type="checkbox" value="weight loss"> Weight Loss</label>
        </div>

        <label for="temp">Temperature (Optional)</label>
        <input type="text" id="temp">

        <label for="bp">Blood Pressure (Optional)</label>
        <input type="text" id="bp">

        <button type="submit" class="btn-primary">Analyze Disease</button>
      </form>
    </div>
  </section>

  <footer class="footer">
